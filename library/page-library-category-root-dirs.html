{{>common/inc-header.html}}

<style>
  body { background: #101010; margin: 0; padding: 0; }

  /* Neutralise les backgrounds injectés par les partials topbar */
  #searchbox, #popupmenu, #pageselector, #dimoverlay,
  .popupmenu, .searchbox, [id^="popup"], [class^="popup"] {
    display: none !important;
  }
  /* Force le fond transparent sur tout ce que les partials génèrent */
  #topbar-library, .library-topbar,
  form[id*="settings"], form[id*="search"],
  #settings-form, #search-form {
    background: transparent !important;
    background-color: transparent !important;
  }
  * { box-sizing: border-box; }

  /* Annule les styles globaux de style.css sur main */
  main, #content, #main {
    max-width: none !important;
    padding: 0 !important;
    margin: 0 !important;
    width: 100% !important;
  }

  .rootdirs-wrap {
    width: calc(5 * (200px + 20px) - 20px);
    max-width: 95vw;
    margin: 40px auto 0;
  }

  /* ── Labels ── */
  .folder-label {
    font-family: 'Noto Sans', sans-serif;
    font-size: 23px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    margin-bottom: 10px;
    width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Grille ── */
  .rootdirs-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .folder-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    width: 200px;
    flex-shrink: 0;
  }

  .folder-card {
    width: 200px;
    height: 288px;
    border-radius: 5px;
    border: 3px solid #aaaaaa;
    overflow: hidden;
    transition: border-color 0.2s;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .folder-item:hover .folder-card { border-color: #4ca2d8; }

  .folder-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    position: absolute;
    top: 0; left: 0;
  }

  .folder-fallback {
    font-size: 64px;
    color: #333;
  }

  /* ── Pagination ── */
  .rootdirs-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 0 0 32px;
  }

  .page-btn {
    padding: 6px 14px;
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #aaaaaa;
    font-family: 'Noto Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .page-btn:hover { border-color: #4ca2d8; color: #fff; }

  .page-current {
    padding: 6px 16px;
    background: #4ca2d8;
    border-radius: 6px;
    color: #fff;
    font-family: 'Noto Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

</style>

<main>
<div class="rootdirs-wrap">

  <!-- Grille -->
  <div class="rootdirs-grid">
    {{#rootFolders}}
    <a class="folder-item" href="{{folderUrl}}">
      <div class="folder-label" title="{{folderName}}">{{folderName}}</div>
      <div class="folder-card" data-folder-url="{{folderUrl}}">
        <img class="folder-cover" src="" alt="{{folderName}}"/>
        <span class="folder-fallback">📁</span>
      </div>
    </a>
    {{/rootFolders}}
  </div>

  <!-- Pagination -->
  <div class="rootdirs-pagination" id="rootdirs-pagination">
    <a href="{{prev10pageUrl}}" class="page-btn">«</a>
    <a href="{{prevPageUrl}}"   class="page-btn">‹</a>
    <span class="page-current">{{pageNumber}} / {{totalPages}}</span>
    <a href="{{nextPageUrl}}"   class="page-btn">›</a>
    <a href="{{next10pageUrl}}" class="page-btn">»</a>
  </div>


</div>
</main>

<script>
(function () {
  // Masque pagination si 1 seule page
  var pag = document.getElementById('rootdirs-pagination');
  if (pag) {
    var cur = pag.querySelector('.page-current');
    if (cur) {
      var total = parseInt((cur.textContent.split('/')[1] || '0').trim(), 10);
      if (total <= 1) pag.style.display = 'none';
    }
  }

  // Charge la couverture de chaque dossier
  document.querySelectorAll('.folder-card[data-folder-url]').forEach(function (card) {
    var url      = card.dataset.folderUrl;
    var img      = card.querySelector('.folder-cover');
    var fallback = card.querySelector('.folder-fallback');
    if (!url || !img) return;

    fetch(url)
      .then(function (r) { return r.text(); })
      .then(function (html) {
        var doc  = new DOMParser().parseFromString(html, 'text/html');
        var imgs = doc.querySelectorAll('.book img, #booksContainer img');
        if (!imgs.length) imgs = doc.querySelectorAll('img[src*="cover"], img[src*="thumbnail"]');
        if (!imgs.length) return;
        img.src = imgs[0].src;
        img.style.display = 'block';
        if (fallback) fallback.style.display = 'none';
      })
      .catch(function () {});
  });
})();
</script>



<footer id="footer" style="border-top:1px solid #212121;padding:16px 32px;text-align:center;font-size:12px;color:#333;">

</footer>
</body>
</html>
