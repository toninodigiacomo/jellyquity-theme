<div id="topbarleft"></div>
<div id="topbarcenter">
  <a href="{{parentUrl}}" id="btn-up" title="Monter"
     style="display:inline-flex;align-items:center;padding:7px;border-radius:8px;transition:opacity 0.2s;opacity:0.55;"
     onmouseover="this.style.opacity='1';"
     onmouseout="this.style.opacity='0.55';">
    <img src="{{rootPath}}/theme/common/icon-up.svg" alt="Monter"
         style="width:24px;height:24px;display:block;"/>
  </a>
  <a href="#" id="btn-settings" title="Paramètres"
     onclick="togglePopup('settingsbox');return false;"
     style="display:inline-flex;align-items:center;padding:7px;border-radius:8px;transition:opacity 0.2s;opacity:0.55;"
     onmouseover="this.style.opacity='1';"
     onmouseout="this.style.opacity='0.55';">
    <img src="{{rootPath}}/theme/common/icon-settings.svg" alt="Paramètres"
         style="width:24px;height:24px;display:block;"/>
  </a>
  <a href="?random=true" id="btn-random" title="Aléatoire"
     style="display:inline-flex;align-items:center;padding:7px;border-radius:8px;transition:opacity 0.2s;opacity:0.55;"
     onmouseover="this.style.opacity='1';"
     onmouseout="this.style.opacity='0.55';">
    <img src="{{rootPath}}/theme/common/icon-random.svg" alt="Aléatoire"
         style="width:24px;height:24px;display:block;"/>
  </a>
</div>
<div id="topbarright"></div>
