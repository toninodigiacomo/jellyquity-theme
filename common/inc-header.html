<!DOCTYPE html>
<link rel="icon" type="image/png" sizes="16x16" href="{{rootPath}}/theme/common/favicon-16x16.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="{{rootPath}}/theme/common/favicon-32x32.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="{{rootPath}}/theme/common/favicon-96x96.png"/>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ubooquity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;900&display=swap"/>
  <link rel="stylesheet" type="text/css" href="{{rootPath}}/theme/common/style.css"/>
  <script src="{{rootPath}}/theme/common/themeScript.js"></script>
</head>
<body>
  <header id="topbar">

    <!-- Logo + titre -->
    <div style="display:flex;align-items:center;gap:10px;flex:1;">
      <a href="{{rootPath}}/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="{{rootPath}}/theme/common/logo.png" alt="Ubooquity"
            style="width:36px;height:36px;object-fit:contain;flex-shrink:0;"/>
        <span id="siteTitle">Ubooquity</span>
      </a>
    </div>


    <!-- Boutons Recherche, Accueil — id présent pour le JS -->
    <nav id="navigation-buttons" style="display:flex;align-items:right;justify-content:right;flex:0;">
      <a href="#" title="Recherche" onclick="toggleSearch(event)"
         id="btn-search"
         style="display:inline-flex;align-items:right;padding:7px;border-radius:8px;transition:opacity 0.2s;opacity:0.55;"
         onmouseover="this.style.opacity='1';"
         onmouseout="this.style.opacity='0.55';">
         <img src="{{rootPath}}/theme/common/icon-search.svg" alt="Recherche"
            style="width:24px;height:24px;display:block;"/>
      </a>
      <a href="{{rootPath}}/" title="Accueil"
         id="btn-home"
         style="display:inline-flex;align-items:right;padding:7px;border-radius:8px;transition:opacity 0.2s;opacity:0.55;"
         onmouseover="this.style.opacity='1';"
         onmouseout="this.style.opacity='0.55';">
         <img src="{{rootPath}}/theme/common/icon-home.svg" alt="Accueil"
            style="width:24px;height:24px;display:block;"/>
      </a>
    </nav>

      {{#userName}}
      <div style="display:flex;align-items:center;gap:10px;margin-left:4px;flex-shrink:0;">
        <!-- Avatar initiale -->
        <div id="user-avatar" style="width:32px;height:32px;background:#4ca2d8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans',sans-serif;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;text-transform:uppercase;">
          {{userName}}
        </div>
        <!-- Nom complet -->
        <span style="font-family:'Noto Sans',sans-serif;font-size:14px;font-weight:600;color:#ffffff;white-space:nowrap;">
          {{userName}}
        </span>
        <!-- Séparateur -->
        <span style="color:#333;">|</span>
        <!-- Lien déconnexion -->
        <a href="{{rootPath}}/?logout=true"
           style="font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:400;color:#aaaaaa;text-decoration:none;white-space:nowrap;transition:color 0.2s;"
           onmouseover="this.style.color='#ffffff';"
           onmouseout="this.style.color='#aaaaaa';">
          Déconnexion
        </a>
      </div>
      {{/userName}}

      <div id="search-popup" style="display:none;position:fixed;top:56px;right:16px;
        background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:8px;
        padding:16px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,0.5);">
        <form id="header-search-form" style="display:flex;gap:8px;">
          <input type="search" id="header-search-input" placeholder="Rechercher…"
            style="background:#101010;border:1px solid rgba(255,255,255,0.15);
            border-radius:6px;color:#fff;font-family:'Noto Sans',sans-serif;
            font-size:14px;padding:8px 12px;outline:none;width:220px;"/>
          <button type="submit"
            style="background:#4ca2d8;border:none;border-radius:6px;color:#fff;
            font-family:'Noto Sans',sans-serif;font-size:14px;font-weight:700;
            padding:8px 14px;cursor:pointer;">
            Rechercher
          </button>
        </form>
      </div>

  </header>

  <script>
  (function () {
    var rootPath = '{{rootPath}}';
    var path = window.location.pathname;

    // ── Avatar : affiche seulement l'initiale ──────────────────
    var avatar = document.getElementById('user-avatar');
    if (avatar) {
      var initial = avatar.textContent.trim().charAt(0).toUpperCase();
      avatar.textContent = initial;
    }

    // ── Bouton Accueil ──────────────────────────────────────────
    // On compare le chemin courant à la racine (avec et sans slash final,
    // avec et sans rootPath). Si on est sur la home, on masque le bouton.
    var cleanPath = path.replace(/\/$/, '') || '/';
    var cleanRoot = (rootPath || '').replace(/\/$/, '');
    var isHome = (cleanPath === cleanRoot || cleanPath === '' || cleanPath === '/');

    var nav = document.getElementById('navigation-buttons');
    if (nav) {
      nav.style.visibility = isHome ? 'hidden' : 'visible';
    }

    // ── Popup recherche ──────────────────────────────────────
    window.toggleSearch = function(e) {
      e.preventDefault();
      var popup = document.getElementById('search-popup');
      if (!popup) return;
      var visible = popup.style.display !== 'none';
      popup.style.display = visible ? 'none' : 'block';
      if (!visible) document.getElementById('header-search-input').focus();
    };

    // Ferme la popup si on clique ailleurs
    document.addEventListener('click', function(e) {
      var popup = document.getElementById('search-popup');
      var btn   = document.getElementById('btn-search');
      if (popup && btn && !popup.contains(e.target) && !btn.contains(e.target)) {
        popup.style.display = 'none';
      }
    });

    // Submit : construit l'URL depuis la catégorie courante
    var searchForm = document.getElementById('header-search-form');
    if (searchForm) {
      searchForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var val = document.getElementById('header-search-input').value.trim();
        if (!val) return;

        // Ubooquity attend : POST vers ?search=simple avec searchstring=<terme>
        // On crée un formulaire temporaire et on le soumet
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = '?search=simple';

        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'searchstring';
        input.value = val;

        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
      });
    }

  })();
  </script>
